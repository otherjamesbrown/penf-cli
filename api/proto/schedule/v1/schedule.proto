// Schedule Service Protobuf Definitions
// Provides gRPC service for DB-driven schedule management — cron, interval, heartbeat jobs.

syntax = "proto3";

package penfold.schedule.v1;

option go_package = "github.com/otherjamesbrown/penf-cli/api/proto/schedule/v1;schedulev1";

import "google/protobuf/timestamp.proto";

service ScheduleService {
  rpc CreateSchedule(CreateScheduleRequest) returns (CreateScheduleResponse);
  rpc UpdateSchedule(UpdateScheduleRequest) returns (UpdateScheduleResponse);
  rpc DeleteSchedule(DeleteScheduleRequest) returns (DeleteScheduleResponse);
  rpc ListSchedules(ListSchedulesRequest) returns (ListSchedulesResponse);
  rpc PauseSchedule(PauseScheduleRequest) returns (PauseScheduleResponse);
  rpc ResumeSchedule(ResumeScheduleRequest) returns (ResumeScheduleResponse);
  rpc GetScheduleHistory(GetScheduleHistoryRequest) returns (GetScheduleHistoryResponse);
  rpc TriggerSchedule(TriggerScheduleRequest) returns (TriggerScheduleResponse);
}

message CreateScheduleRequest {
  string tenant_id = 1;
  string name = 2;
  string description = 3;
  string type = 4;
  string cron_expr = 5;
  string workflow_type = 6;
  string workflow_params = 7;
  string overlap_policy = 8;
}

message CreateScheduleResponse {
  string schedule_id = 1;
}

message UpdateScheduleRequest {
  string tenant_id = 1;
  string schedule_id = 2;
  string description = 3;
  string cron_expr = 4;
  string workflow_type = 5;
  string workflow_params = 6;
  string overlap_policy = 7;
}

message UpdateScheduleResponse {}

message DeleteScheduleRequest {
  string tenant_id = 1;
  string schedule_id = 2;
}

message DeleteScheduleResponse {}

message ListSchedulesRequest {
  string tenant_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListSchedulesResponse {
  repeated ScheduleSummary schedules = 1;
  int32 total_count = 2;
}

message ScheduleSummary {
  string id = 1;
  string name = 2;
  string description = 3;
  string type = 4;
  string cron_expr = 5;
  string workflow_type = 6;
  bool enabled = 7;
  string overlap_policy = 8;
  string last_status = 9;
  google.protobuf.Timestamp last_run_at = 10;
  google.protobuf.Timestamp next_run_at = 11;
  string last_error = 12;
}

message PauseScheduleRequest {
  string tenant_id = 1;
  string schedule_id = 2;
}

message PauseScheduleResponse {}

message ResumeScheduleRequest {
  string tenant_id = 1;
  string schedule_id = 2;
}

message ResumeScheduleResponse {}

message GetScheduleHistoryRequest {
  string tenant_id = 1;
  string schedule_id = 2;
  int32 limit = 3;
}

message GetScheduleHistoryResponse {
  repeated ScheduleExecution executions = 1;
}

message ScheduleExecution {
  string schedule_id = 1;
  string status = 2;
  google.protobuf.Timestamp started_at = 3;
  google.protobuf.Timestamp completed_at = 4;
  string error = 5;
  string workflow_run_id = 6;
}

message TriggerScheduleRequest {
  string tenant_id = 1;
  string schedule_id = 2;
}

message TriggerScheduleResponse {}
